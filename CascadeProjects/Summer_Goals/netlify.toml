[build]
  publish = "."
  command = "echo 'No build required'"

# Serve static files before SPA fallback
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "/partials/*"
  to = "/partials/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
