<div id="create-habit-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Create New Habit</h2>
      <button type="button" class="close-btn" data-close="create-habit-modal" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <input type="text" id="habit-title" placeholder="Habit Title" class="modal-field" />
      <textarea
        id="habit-description"
        placeholder="Description"
        class="modal-field modal-textarea"
        rows="3"
      ></textarea>
      <input
        type="text"
        id="habit-goal"
        placeholder="Goal (e.g., Daily, 3x per week)"
        class="modal-field"
      />
      <label class="modal-label" for="habit-category">Category</label>
      <select id="habit-category" class="modal-field">
        <option value="wellness">Wellness</option>
        <option value="social">Social</option>
        <option value="learning">Learning</option>
      </select>
      <div id="create-day-section">
        <p class="modal-label" id="create-schedule-label">Which days will you do this?</p>
        <div id="create-day-picker" class="day-picker"></div>
      </div>
      <div id="create-deadline-section" class="hidden">
        <label class="modal-label" for="create-goal-deadline">Finish by</label>
        <input type="date" id="create-goal-deadline" class="modal-field" min="2026-06-01" max="2026-09-30" />
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" data-close="create-habit-modal">Cancel</button>
      <button type="button" class="btn btn-primary" id="create-habit-submit">Create</button>
    </div>
  </div>
</div>

<div id="join-habit-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="join-modal-title">Join a habit</h2>
      <button type="button" class="close-btn" data-close="join-habit-modal" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body join-modal-body">
      <div id="join-habit-list" class="join-habit-list"></div>
      <div id="join-day-section" class="join-day-section hidden">
        <p class="modal-label" id="join-schedule-label">Pick the days you'll do this habit</p>
        <div id="join-day-picker" class="day-picker"></div>
      </div>
      <div id="join-deadline-section" class="join-day-section hidden">
        <p class="modal-label">Goal deadline</p>
        <p id="join-deadline-display" class="modal-hint"></p>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" id="join-modal-cancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="join-modal-submit">Join habit</button>
    </div>
  </div>
</div>

<div id="edit-habit-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Edit habit</h2>
      <button type="button" class="close-btn" data-close="edit-habit-modal" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <label class="modal-label" for="edit-habit-title">Name</label>
      <input type="text" id="edit-habit-title" class="modal-field" placeholder="Habit name" />
      <label class="modal-label" for="edit-habit-description">Description</label>
      <textarea
        id="edit-habit-description"
        class="modal-field modal-textarea"
        placeholder="Description"
        rows="3"
      ></textarea>
      <label class="modal-label" for="edit-habit-category">Category</label>
      <select id="edit-habit-category" class="modal-field">
        <option value="wellness">Wellness</option>
        <option value="social">Social</option>
        <option value="learning">Learning</option>
      </select>
      <div id="edit-day-section">
        <p class="modal-label" id="edit-schedule-label">Your schedule days</p>
        <div id="edit-day-picker" class="day-picker"></div>
      </div>
      <div id="edit-deadline-section" class="hidden">
        <label class="modal-label" for="edit-goal-deadline">Finish by</label>
        <input type="date" id="edit-goal-deadline" class="modal-field" min="2026-06-01" max="2026-09-30" />
      </div>
      <p id="edit-creator-note" class="modal-hint hidden">Only the creator can edit the name and description.</p>
    </div>
    <div class="modal-footer modal-footer--split">
      <div class="modal-footer__danger">
        <button type="button" class="btn btn-outline" id="edit-leave-btn">Leave habit</button>
        <button type="button" class="btn btn-danger hidden" id="edit-delete-all-btn">Delete for everyone</button>
      </div>
      <div class="modal-footer__actions">
        <button type="button" class="btn btn-outline" data-close="edit-habit-modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="edit-habit-save">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="habit-detail-modal" class="modal hidden">
  <div class="modal-content modal-large">
    <div class="modal-header">
      <h2 id="detail-title"></h2>
      <button type="button" class="close-btn" data-close="habit-detail-modal" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="detail-section">
        <h3>Created by</h3>
        <p id="detail-creator"></p>
      </div>
      <div class="detail-section">
        <h3>Description</h3>
        <p id="detail-description"></p>
      </div>
      <div class="detail-section">
        <h3>Goal</h3>
        <p id="detail-goal"></p>
      </div>
      <div class="detail-section">
        <h3>Participants</h3>
        <div id="detail-participants" class="participants-list"></div>
      </div>
      <div class="detail-section">
        <h3>Comments</h3>
        <div id="comments-list" class="comments-list"></div>
        <div class="comment-input-row">
          <textarea
            id="comment-input"
            placeholder="Add a comment..."
            class="comment-textarea"
            rows="2"
          ></textarea>
          <button type="button" class="btn btn-primary" id="post-comment-btn">Post</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" id="delete-habit-btn" class="btn btn-danger hidden">Delete Habit</button>
      <button type="button" class="btn btn-outline" data-close="habit-detail-modal">Close</button>
    </div>
  </div>
</div>
