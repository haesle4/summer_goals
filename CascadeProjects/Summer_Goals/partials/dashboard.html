<div class="app-page">
  <header class="top-nav">
    <div class="nav-brand">
      <span class="nav-brand__sun" aria-hidden="true">☼</span>
      <h1 class="nav-logo">
        Summer Goals
      </h1>
    </div>
    <img
      class="nav-illustration"
      src="assets/beach-illustration.png"
      alt=""
      aria-hidden="true"
    />
    <div class="nav-profile">
      <button type="button" class="toolbar-btn nav-switch-btn" id="home-btn">
        <span class="toolbar-btn__icon" aria-hidden="true">☼</span>
        Home
      </button>
      <button
        type="button"
        class="nav-avatar"
        id="nav-avatar"
        aria-label="Profile menu"
      >
        <span id="avatar-initial">M</span>
      </button>
      <button
        type="button"
        class="nav-chevron"
        id="profile-toggle"
        aria-label="Open menu"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M6 9L12 15L18 9"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <div id="profile-menu" class="profile-menu hidden">
        <button type="button" id="logout-btn">Log out</button>
      </div>
    </div>
  </header>

  <div class="dashboard-toolbar">
    <div
      class="segmented-control"
      role="tablist"
      aria-label="Dashboard sections"
    >
      <button
        type="button"
        class="segment active"
        data-tab="habits"
        role="tab"
        aria-selected="true"
      >
        My Habits
      </button>
      <button
        type="button"
        class="segment"
        data-tab="goals"
        role="tab"
        aria-selected="false"
      >
        My Goals
      </button>
      <button
        type="button"
        class="segment"
        data-tab="standings"
        role="tab"
        aria-selected="false"
      >
        My Standings
      </button>
    </div>
    <div class="toolbar-actions" id="toolbar-actions">
      <button type="button" class="toolbar-btn" id="join-habit-btn">
        <span class="toolbar-btn__icon" aria-hidden="true">☼</span>
        Join Habit
      </button>
      <button type="button" class="toolbar-btn" id="create-habit-btn">
        <span class="toolbar-btn__icon" aria-hidden="true">☼</span>
        Create Habit
      </button>
    </div>
  </div>

  <div class="dashboard-grid">
    <aside class="habits-panel">
      <div class="habits-panel-scroll">
        <div id="habits-list" class="habits-list"></div>
        <div id="standings-list" class="standings-panel hidden"></div>
      </div>
    </aside>

    <section class="stats-panel">
      <div class="chart-card">
        <div class="chart-card-inner">
          <h2 class="chart-title" id="chart-title-text">Habits Completed</h2>
          <p class="chart-subtitle" id="chart-subtitle-text">
            Bright = done · faded = still to do
          </p>
          <div id="habit-chart-view">
            <div class="chart-legend">
              <div class="chart-legend-item">
                <span
                  class="chart-legend-swatch chart-legend-swatch--wellness"
                ></span>
                <span>Wellness</span>
              </div>
              <div class="chart-legend-item">
                <span
                  class="chart-legend-swatch chart-legend-swatch--social"
                ></span>
                <span>Social</span>
              </div>
              <div class="chart-legend-item">
                <span
                  class="chart-legend-swatch chart-legend-swatch--learning"
                ></span>
                <span>Learning</span>
              </div>
            </div>
            <div id="chart-y-labels" class="chart-y-labels">
              <span>9</span>
              <span>6</span>
              <span>3</span>
            </div>
            <div class="chart-y-line"></div>
            <div class="chart-x-line"></div>
            <div id="chart-bars" class="chart-bars"></div>
            <div class="chart-x-labels">
              <span>S</span>
              <span>M</span>
              <span>T</span>
              <span>W</span>
              <span>T</span>
              <span>F</span>
              <span>S</span>
            </div>
          </div>
          <div id="goal-calendar-view" class="hidden">
            <div class="goal-calendar-legend">
              <span class="goal-calendar-legend-item">
                <span
                  class="goal-calendar-legend-swatch goal-calendar-legend-swatch--overdue"
                ></span>
                Overdue
              </span>
              <span class="goal-calendar-legend-item">
                <span
                  class="goal-calendar-legend-swatch goal-calendar-legend-swatch--done"
                ></span>
                Done
              </span>
              <span class="goal-calendar-legend-item">
                <span
                  class="goal-calendar-legend-swatch goal-calendar-legend-swatch--future"
                ></span>
                Upcoming
              </span>
            </div>
            <div class="goal-calendar-nav">
              <button
                type="button"
                class="goal-calendar-nav-btn"
                id="calendar-prev"
                aria-label="Previous month"
              >
                ‹
              </button>
              <span class="goal-calendar-month-title" id="calendar-month-title"
                >June 2026</span
              >
              <button
                type="button"
                class="goal-calendar-nav-btn"
                id="calendar-next"
                aria-label="Next month"
              >
                ›
              </button>
            </div>
            <div id="goal-calendar" class="goal-calendar-grid-wrap"></div>
          </div>
        </div>
      </div>

      <div class="chat-card">
        <div class="chat-card-inner">
          <div class="chat-header">
            <h2 class="chat-title" id="chat-title-text">General chat</h2>
            <select
              id="chat-habit-select"
              class="chat-habit-select"
              aria-label="Select habit chat"
            ></select>
          </div>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input
              type="text"
              id="chat-message-input"
              class="chat-input"
              placeholder="Enter your message"
              maxlength="200"
            />
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="app-footer">
    <img
      class="footer-deco footer-deco--sun"
      src="assets/sun-shells.png"
      alt=""
      aria-hidden="true"
    />
    <p class="footer-quote">
      Live in the sunshine. Swim in the sea. Drink in the wild air.
    </p>
    <img
      class="footer-deco footer-deco--shells"
      src="assets/sun-shells.png"
      alt=""
      aria-hidden="true"
    />
  </footer>
</div>
