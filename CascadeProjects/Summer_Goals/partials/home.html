<div class="home-page">
  <header class="top-nav home-top-nav">
    <div class="nav-brand">
      <span class="nav-brand__sun" aria-hidden="true">☼</span>
      <h1 class="nav-logo">Summer Goals</h1>
    </div>
    <img
      class="nav-illustration"
      src="assets/beach-illustration.png"
      alt=""
      aria-hidden="true"
    />
    <div class="nav-profile">
      <button type="button" class="toolbar-btn nav-switch-btn" id="my-progress-btn">
        <span class="toolbar-btn__icon" aria-hidden="true">☼</span>
        My Summer
      </button>
      <button
        type="button"
        class="nav-avatar"
        id="home-nav-avatar"
        aria-label="Profile menu"
      >
        <span id="home-avatar-initial">M</span>
      </button>
      <button
        type="button"
        class="nav-chevron"
        id="home-profile-toggle"
        aria-label="Open menu"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M6 9L12 15L18 9"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <div id="home-profile-menu" class="profile-menu hidden">
        <button type="button" id="home-logout-btn">Log out</button>
      </div>
    </div>
  </header>

  <main class="home-body">
    <section class="home-stats" aria-label="Group summary">
      <div class="home-stat">
        <span class="home-stat-number" id="stat-habits-completed">0</span>
        <span class="home-stat-label">Habits completed</span>
      </div>
      <div class="home-stat">
        <span class="home-stat-number" id="stat-goals-completed">0</span>
        <span class="home-stat-label">Goals completed</span>
      </div>
      <div class="home-stat">
        <span class="home-stat-number" id="stat-summer-days">0</span>
        <span class="home-stat-label">Days of summer</span>
      </div>
    </section>

    <section class="home-progress-panel" aria-label="Group progress">
      <div class="home-progress-card">
        <div class="home-progress-inner">
          <h2 class="home-progress-title">Group Progress</h2>
          <div class="home-progress-legend" aria-hidden="true">
            <span class="home-progress-legend-item">
              <span class="home-progress-legend-swatch home-progress-legend-swatch--wellness"></span>
              Wellness
            </span>
            <span class="home-progress-legend-item">
              <span class="home-progress-legend-swatch home-progress-legend-swatch--social"></span>
              Social
            </span>
            <span class="home-progress-legend-item">
              <span class="home-progress-legend-swatch home-progress-legend-swatch--learning"></span>
              Learning
            </span>
          </div>
          <div id="home-progress-chart" class="home-progress-chart"></div>
          <label class="home-progress-view" for="home-time-range">
            <select id="home-time-range" class="home-time-range-select" aria-label="Time range">
              <option value="daily">Daily view</option>
              <option value="weekly" selected>Weekly view</option>
              <option value="all">Up to now</option>
            </select>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </label>
        </div>
      </div>
    </section>

    <section class="home-bottom">
      <div class="home-panel home-activity-panel">
        <div class="home-panel-card">
          <div class="home-panel-inner home-panel-inner--activity">
            <h2 class="home-panel-title">Recent Activity</h2>
            <div id="feed-list" class="feed-list"></div>
          </div>
        </div>
      </div>

      <div class="home-panel home-chat-panel">
        <div class="home-panel-card">
          <div class="home-panel-inner home-panel-inner--chat">
            <div class="home-chat-header">
              <svg class="home-chat-header-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <h2 class="home-panel-title home-panel-title--chat">Habit chat</h2>
            </div>
            <div
              id="home-chat-messages"
              class="chat-messages home-chat-messages"
            ></div>
            <div class="chat-input-row home-chat-input-row">
              <input
                type="text"
                id="home-chat-input"
                class="chat-input home-chat-input"
                placeholder="Enter your message"
                maxlength="200"
              />
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <img
      class="footer-deco footer-deco--sun"
      src="assets/sun-shells.png"
      alt=""
      aria-hidden="true"
    />
    <p class="footer-quote">
      Live in the sunshine. Swim in the sea. Drink in the wild air.
    </p>
    <img
      class="footer-deco footer-deco--shells"
      src="assets/sun-shells.png"
      alt=""
      aria-hidden="true"
    />
  </footer>
</div>
